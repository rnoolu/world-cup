name: Update knockout stage data

on:
  schedule:
    # Every 15 minutes. Scheduled workflows only run on the repo's default
    # branch, so this only takes effect after this branch is merged there.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live scores, venues, scorers & odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 scripts/fetch_scores.py

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh knockout stage data"
            git push
          fi
